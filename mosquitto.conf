# Mosquitto Configuration - Production
listener 1883
protocol mqtt

# Allow anonymous for now (MQTT devices may not support auth)
# To enable auth: set allow_anonymous false and add password_file
allow_anonymous true

# Connection limits
max_connections 100
max_inflight_messages 20
max_queued_messages 1000

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Persistence
persistence true
persistence_location /mosquitto/data/

# Message size limit (1MB)
message_size_limit 1048576
